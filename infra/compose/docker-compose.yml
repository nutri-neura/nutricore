services:
  traefik:
    image: traefik:v3.3
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --ping=true
      - --metrics.prometheus=true
    volumes:
      - ../proxy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 128m
    cpus: 0.50
    pids_limit: 128
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge
      - observability

  api:
    build:
      context: ../../apps/api
    environment:
      APP_NAME: ${APP_NAME:-NutriCore}
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_DB: ${POSTGRES_DB:-nutricore}
      POSTGRES_USER: ${POSTGRES_USER:-nutricore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starter_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUTRICORE_JWT_SECRET: ${NUTRICORE_JWT_SECRET}
      NUTRICORE_JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${NUTRICORE_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      NUTRICORE_CORS_ALLOWED_ORIGINS: ${NUTRICORE_CORS_ALLOWED_ORIGINS:-http://web.localhost,http://web.localhost:8080,http://localhost:3000}
      NUTRICORE_BOOTSTRAP_ADMIN_ENABLED: ${NUTRICORE_BOOTSTRAP_ADMIN_ENABLED:-true}
      NUTRICORE_BOOTSTRAP_ADMIN_NAME: ${NUTRICORE_BOOTSTRAP_ADMIN_NAME:-NutriCoreAdmin}
      NUTRICORE_BOOTSTRAP_ADMIN_EMAIL: ${NUTRICORE_BOOTSTRAP_ADMIN_EMAIL:-admin@nutricore.app}
      NUTRICORE_BOOTSTRAP_ADMIN_PASSWORD: ${NUTRICORE_BOOTSTRAP_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 1.00
    pids_limit: 256
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge
      - backend
      - observability

  web:
    build:
      context: ../../apps/web
    environment:
      API_INTERNAL_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.localhost}
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 1.00
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutricore}
      POSTGRES_USER: ${POSTGRES_USER:-nutricore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starter_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.00
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutricore} -d ${POSTGRES_DB:-nutricore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 128
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.4.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 1.00
    pids_limit: 128
    networks:
      - observability
      - edge

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 384m
    cpus: 1.00
    pids_limit: 256
    depends_on:
      - prometheus
    networks:
      - observability
      - edge

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
  observability:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
