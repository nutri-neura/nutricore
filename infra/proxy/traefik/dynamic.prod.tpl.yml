http:
  routers:
    web:
      rule: Host(`web.${PUBLIC_BASE_DOMAIN}`)
      entryPoints:
        - websecure
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt
      service: web

    api:
      rule: Host(`api.${PUBLIC_BASE_DOMAIN}`)
      entryPoints:
        - websecure
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt
      service: api

    api-metrics-blocked:
      rule: Host(`api.${PUBLIC_BASE_DOMAIN}`) && Path(`/metrics`)
      entryPoints:
        - websecure
      priority: 100
      tls:
        certResolver: letsencrypt
      service: noop@internal

  middlewares:
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: camera=(), microphone=(), geolocation=()
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin

  services:
    web:
      loadBalancer:
        servers:
          - url: http://web:3000

    api:
      loadBalancer:
        servers:
          - url: http://api:8000
